<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G3 CertiTech - Gestão Claro</title>

    <!-- Tailwind (ok para agora, depois podemos otimizar) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Config Tailwind -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              claro: {
                red: '#9B0000',
                redHover: '#800000',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>

    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .claro-gradient {
        background: linear-gradient(135deg, #9B0000 0%, #CC0000 100%);
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>

  <body class="bg-slate-50 text-slate-900 h-screen overflow-hidden">
    <div id="root"></div>

    <!-- 🔥 ESSA LINHA RESOLVE O PROBLEMA -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
